# docker compose up -d                                       → db + adminer
# docker compose --profile backend up -d                     → + API server
# docker compose --profile frontend up -d                    → + nginx-served SPA
# docker compose --profile ollama up -d                      → + containerized Ollama
# docker compose --profile backend --profile frontend --profile ollama up -d → everything

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://scholarrag:scholarrag@db:5432/scholarrag_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEARCH_CHAT_MODEL: ${RESEARCH_CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-mxbai-embed-large}
      EMBEDDING_QUERY_PREFIX: ${EMBEDDING_QUERY_PREFIX:-Represent this sentence for searching relevant passages:}
      EMBEDDING_DOC_PREFIX: ${EMBEDDING_DOC_PREFIX:-Represent this document for retrieval:}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-45}
      EMBEDDING_RETRY_ATTEMPTS: ${EMBEDDING_RETRY_ATTEMPTS:-3}
      EMBEDDING_RETRY_DELAY: ${EMBEDDING_RETRY_DELAY:-0.75}
      EMBEDDING_VERSION: ${EMBEDDING_VERSION:-mxbai-embed-large-v1}
      EMBEDDING_RAW_DIM: ${EMBEDDING_RAW_DIM:-1024}
      VECTOR_STORE_DIM: ${VECTOR_STORE_DIM:-1536}
      STORAGE_DIR: ${STORAGE_DIR:-storage}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/live').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ["backend"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    profiles: ["frontend"]

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: scholarrag
      POSTGRES_PASSWORD: scholarrag
      POSTGRES_DB: scholarrag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql is the canonical schema and includes workspace_id columns,
      # so a fresh Compose volume is fully wired. Existing DBs upgrade via
      # `_ensure_workspace_columns()` which the FastAPI lifespan calls on
      # startup — see backend/pdf_ingest.py.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarrag -d scholarrag_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

volumes:
  pgdata:
  ollamadata:
