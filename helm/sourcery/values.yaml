# Default values for the sourcery chart.
# Override with `helm install sourcery . -f my-values.yaml`.

image:
  backend:
    repository: ghcr.io/sushildalavi/sourcery-backend
    tag: ""              # falls back to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/sushildalavi/sourcery-frontend
    tag: ""
    pullPolicy: IfNotPresent

backend:
  replicaCount: 2
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    EMBEDDING_PROVIDER: ollama
    OLLAMA_BASE_URL: http://ollama:11434
    OLLAMA_EMBED_MODEL: mxbai-embed-large
    EMBEDDING_VERSION: mxbai-embed-large-v1
    EMBEDDING_RAW_DIM: "1024"
    VECTOR_STORE_DIM: "1536"
    CONFIDENCE_USE_FITTED_WEIGHTS: "true"
    ENABLE_HSTS: "true"
  # Mounted from a Kubernetes Secret you create out-of-band, not from values.yaml.
  secretName: sourcery-secrets
  livenessProbe:
    httpGet:
      path: /health/live
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health/ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 5

frontend:
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

postgres:
  # If you already run a managed Postgres, set enabled=false and point
  # the backend's DATABASE_URL secret at it.
  enabled: true
  image: pgvector/pgvector:pg16
  persistence:
    size: 20Gi
    storageClass: ""
  service:
    port: 5432
  auth:
    user: scholarrag
    database: scholarrag
    # Password lives in `{{ .Values.backend.secretName }}` under PGPASSWORD.

ingress:
  enabled: false
  className: nginx
  host: sourcery.example.com
  tls: true

serviceMonitor:
  # Set true if you run Prometheus Operator — scrapes /metrics/prom.
  enabled: false
  interval: 30s
  path: /metrics/prom
