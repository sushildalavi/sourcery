{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sourcery.fullname" . }}-pgdata
  labels:
    {{- include "sourcery.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  {{- with .Values.postgres.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sourcery.fullname" . }}-db
  labels:
    {{- include "sourcery.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  serviceName: {{ include "sourcery.fullname" . }}-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sourcery.fullname" . }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sourcery.fullname" . }}
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: PGPASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.auth.user }}"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pgdata
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: {{ include "sourcery.fullname" . }}-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sourcery.fullname" . }}-db
  labels:
    {{- include "sourcery.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: {{ include "sourcery.fullname" . }}
    app.kubernetes.io/component: db
{{- end }}
