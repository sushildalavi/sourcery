apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "citelens.fullname" . }}-backend
  labels:
    {{- include "citelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "citelens.fullname" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "citelens.fullname" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ include "citelens.backend.image" . }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: {{ .Values.backend.secretName }}
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "citelens.fullname" . }}-backend
  labels:
    {{- include "citelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
      name: http
  selector:
    app.kubernetes.io/name: {{ include "citelens.fullname" . }}
    app.kubernetes.io/component: backend
