name: Feature request
description: Propose something new or a meaningful behavior change.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: What user / dev / ops pain are you hitting today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should the system do? Be concrete — endpoint shape, UI flow, or data structure if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - backend
        - frontend
        - retrieval / confidence
        - evaluation harness
        - infra / CI
