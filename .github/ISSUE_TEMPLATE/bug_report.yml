name: Bug report
description: Something doesn't behave the way the README / code claims.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: One-paragraph description.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact request, query, or click sequence. If a curl command, paste it.
      placeholder: |
        1. `make compose-up`
        2. `curl -X POST http://127.0.0.1:8000/assistant/answer -d '{"query":"..."}'`
        3. observe ...
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit
      description: Output of `git rev-parse HEAD`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Backend log lines around the failure
      render: shell

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - backend (FastAPI)
        - frontend (React)
        - retrieval (pgvector / hybrid scoring)
        - confidence (MSA / calibration)
        - public search (7 APIs)
        - infra (compose / CI / Dockerfile)
    validations:
      required: true
