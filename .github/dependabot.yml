version: 2
# Conservative cadence — monthly, tight PR limits, single grouped PR per
# ecosystem, no major bumps, no auto-review-request floods.
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      python:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: [dependencies, python]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    versioning-strategy: increase-if-necessary
    groups:
      npm:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: [dependencies, javascript]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns: ["*"]
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: [dependencies, docker]
