version: 2
updates:
  # ── Python (backend) ─────────────────────────────────────────────
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      python-runtime:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns:
          - "*"
        exclude-patterns:
          - "ruff"
          - "pyright"
          - "pytest*"
          - "coverage"
      python-dev:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns:
          - "ruff"
          - "pyright"
          - "pytest*"
          - "coverage"
    ignore:
      # Major bumps require manual review; let security alerts take priority.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - python

  # ── npm (frontend) ───────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary
    groups:
      react:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
      build-tooling:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "eslint*"
          - "@eslint/*"
          - "typescript"
          - "@typescript-eslint/*"
      ui:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns:
          - "lucide-react"
          - "framer-motion"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "tailwind-merge"
          - "clsx"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - javascript

  # ── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci

  # ── Docker base images (root + frontend) ─────────────────────────
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - docker
