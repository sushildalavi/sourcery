[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
python_classes = ["*Tests", "Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::DeprecationWarning:PyPDF2",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — handled by formatter
    "F401",   # imported but unused — many deliberate re-exports
    "E402",   # module level import not at top — config-dependent imports
    "W291",   # trailing whitespace
    "W293",   # whitespace before :
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["F811"]  # allow redefinition in test files

[tool.pyright]
pythonVersion = "3.11"
# Pyright runs in CI on a curated set of modules where we maintain strict
# type fidelity. The full backend is not yet pyright-clean (it grew before
# strict typing) — bring more modules under coverage as they're tightened.
include = [
    "backend/middleware.py",
    "backend/schemas.py",
    "backend/confidence.py",
    "backend/eval_metrics.py",
    "backend/services/nli.py",
    "backend/services/reranker.py",
]
exclude = ["**/__pycache__", ".venv", "frontend", "backend/tests"]
typeCheckingMode = "basic"
reportMissingImports = "warning"
